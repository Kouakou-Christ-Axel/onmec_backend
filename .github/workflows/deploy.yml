name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Prisma client
        id: prisma-cache
        uses: actions/cache@v4
        with:
          path: node_modules/.prisma
          key: prisma-${{ runner.os }}-${{ hashFiles('prisma/schema.prisma') }}

      - name: Generate Prisma client
        if: steps.prisma-cache.outputs.cache-hit != 'true'
        run: pnpm exec prisma generate
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

      - name: Type check
        run: npx tsc --noEmit

  migrate:
    name: Migrate & Seed
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    timeout-minutes: 10

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Apply migrations and seed on VPS
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'ENDSSH'
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && source "$NVM_DIR/nvm.sh" || { echo "nvm introuvable"; exit 1; }
            APP_DIR="/var/www/onmec/backend"
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone git@github.com:${{ github.repository }}.git "$APP_DIR"
            fi
            cd "$APP_DIR"
            git pull origin master
            pnpm install --frozen-lockfile
            pnpm exec prisma migrate deploy
            pnpm exec prisma db seed
          ENDSSH

  deploy:
    name: Deploy
    needs: migrate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    timeout-minutes: 30

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Deploy to VPS
        timeout-minutes: 25
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'ENDSSH'
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && source "$NVM_DIR/nvm.sh" || { echo "nvm introuvable"; exit 1; }
            nvm use default
            cd /var/www/onmec/backend

            [ -d dist ] && cp -r dist dist_backup || true

            if ! pnpm exec prisma generate || ! pnpm build; then
              echo "Build failed — restoring previous dist"
              [ -d dist_backup ] && rm -rf dist && mv dist_backup dist || true
              exit 1
            fi

            if ! pm2 reload ecosystem.config.js --env production; then
              echo "Reload failed — restoring previous dist"
              [ -d dist_backup ] && rm -rf dist && mv dist_backup dist && pm2 reload ecosystem.config.js --env production || true
              exit 1
            fi

            rm -rf dist_backup

            sleep 5
            if ! pm2 list | grep -q "onmec-api.*online"; then
              echo "App not online after deploy"
              exit 1
            fi
          ENDSSH
